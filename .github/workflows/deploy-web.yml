name: بناء ونشر نسخة الويب

on:
  push:
    branches: [source]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: web-deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: تفعيل pnpm
        run: |
          npm install -g corepack@latest
          corepack enable
          corepack prepare pnpm@11.9.0 --activate

      - name: تثبيت الاعتماديات
        run: |
          pnpm install --frozen-lockfile
          pnpm rebuild esbuild

      - name: بناء نسخة الويب
        run: pnpm run build

      - name: تجهيز ملفات الموقع
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: النشر إلى فرع main (يُقدَّم تلقائيًا عبر GitHub Pages)
        run: |
          cd dist
          git init -b main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "نشر نسخة الويب من ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
